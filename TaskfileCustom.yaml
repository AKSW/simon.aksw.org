# https://taskfile.dev
---
version: '3'

tasks:

  run-uvicorn:
    desc: Start a hot-reloading uvicorn web server on http://127.0.0.1:8000
    interactive: true
    cmds:
      - >
        poetry run
        uvicorn $package_dir.app:app --reload
        --log-config=logconf.yaml
        --log-level debug

  docker:prepare:
    desc: Prepare the docker image
    cmds:
      - rm -f docker/*.tar.gz
      - task: clean
      - task: build
      - cp dist/requirements.txt docker/
      - cp dist/*.tar.gz docker

